
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>風ヨガ ～こころとからだの癒しの時間～</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Zen Maru Gothic"', 'sans-serif'],
            },
            colors: {
              'breeze-50': '#f0f9ff',
              'breeze-100': '#e0f2fe',
              'breeze-200': '#bae6fd',
              'breeze-300': '#7dd3fc',
              'breeze-400': '#38bdf8',
              'breeze-500': '#0ea5e9',
              'sage-50': '#f2fcf5',
              'sage-100': '#dcfce7',
              'sage-800': '#166534',
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'sway': 'sway 5s ease-in-out infinite',
              'drift': 'drift 20s linear infinite',
              'fade-in-up': 'fadeInUp 1.2s ease-out forwards',
              'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0) scale(1)' },
                '50%': { transform: 'translateY(-15px) scale(1.02)' },
              },
              sway: {
                '0%, 100%': { transform: 'rotate(-1.5deg)' },
                '50%': { transform: 'rotate(1.5deg)' },
              },
              drift: {
                '0%': { transform: 'translateX(-10vw) translateY(0) rotate(0deg)', opacity: 0 },
                '10%': { opacity: 0.4 },
                '90%': { opacity: 0.4 },
                '100%': { transform: 'translateX(110vw) translateY(-100px) rotate(360deg)', opacity: 0 },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: 0.4 },
                '50%': { opacity: 0.7 },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Zen Maru Gothic', sans-serif;
        overflow-x: hidden;
      }
      html {
        scroll-behavior: smooth;
      }
      /* そよ風の微粒子演出 */
      .breeze-particle {
        position: fixed;
        background: white;
        border-radius: 50%;
        pointer-events: none;
        z-index: 1;
        filter: blur(2px);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      }
      /* ガラスモーフィズム */
      .glass-card {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      /* カスタムスクロールバー */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #fdfdfd;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #bae6fd;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #7dd3fc;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0"
  }
}
</script>
</head>
  <body class="bg-[#fafaf9] text-stone-700 antialiased selection:bg-breeze-200">
    <!-- Breeze Particles (Background layer) -->
    <div class="fixed inset-0 pointer-events-none z-[1] overflow-hidden">
      <div class="breeze-particle w-1.5 h-1.5 top-[15%] left-[-10%] animate-drift" style="animation-delay: 0s; animation-duration: 25s;"></div>
      <div class="breeze-particle w-3 h-3 top-[45%] left-[-10%] animate-drift" style="animation-delay: 4s; animation-duration: 18s;"></div>
      <div class="breeze-particle w-2 h-2 top-[75%] left-[-10%] animate-drift" style="animation-delay: 8s; animation-duration: 22s;"></div>
      <div class="breeze-particle w-1 h-1 top-[25%] left-[-10%] animate-drift" style="animation-delay: 12s; animation-duration: 30s;"></div>
      <div class="breeze-particle w-2.5 h-2.5 top-[55%] left-[-10%] animate-drift" style="animation-delay: 16s; animation-duration: 20s;"></div>
      <div class="breeze-particle w-1.5 h-1.5 top-[85%] left-[-10%] animate-drift" style="animation-delay: 2s; animation-duration: 24s;"></div>
    </div>
    
    <div id="root"></div>
  </body>
</html>
